name: dB Dergi sitesini yayınla

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Dosyaları al
        uses: actions/checkout@v6

      - name: GitHub Pages'i hazırla
        uses: actions/configure-pages@v5

      - name: Kapak araçlarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils webp

      - name: Site klasörünü hazırla
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/
          touch _site/.nojekyll

      - name: PDF kapaklarını otomatik üret
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site/assets/covers
          mkdir -p /tmp/dbdergi-covers

          while IFS= read -r -d '' pdf; do
            filename="$(basename "$pdf")"
            basename_without_pdf="${filename%.*}"
            temporary_image="/tmp/dbdergi-covers/${basename_without_pdf}"
            cover="_site/assets/covers/${basename_without_pdf}.webp"

            pdftoppm \
              -f 1 \
              -l 1 \
              -singlefile \
              -jpeg \
              -r 120 \
              "$pdf" \
              "$temporary_image"

            cwebp \
              -quiet \
              -q 80 \
              -resize 900 0 \
              "${temporary_image}.jpg" \
              -o "$cover"

            echo "Kapak üretildi: $cover"
          done < <(
            find _site/assets \
              -maxdepth 1 \
              -type f \
              -iname 'sayi-*.pdf' \
              -print0
          )

      - name: Siteyi paketle
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Siteyi yayınla
        id: deployment
        uses: actions/deploy-pages@v4
