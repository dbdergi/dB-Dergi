<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dB Dergi</title>

  <link rel="icon" type="image/png" href="assets/favicon.png?v=3">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #2c2c2c 0%, #111111 42%, #050505 100%);
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      min-height: 70px;
      padding: 15px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.72);
    }

    .logo {
      color: #ffffff;
      text-decoration: none;
      font-size: 23px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span {
      font-weight: 400;
    }

    .issue-name {
      color: #aaaaaa;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      min-height: calc(100vh - 140px);
      padding: 25px 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading {
      min-height: 40px;
      margin-bottom: 12px;
      color: #bbbbbb;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .book-area {
      width: 100%;
      display: flex;
      justify-content: center;
      perspective: 1800px;
    }

    .book {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 24px 35px rgba(0, 0, 0, 0.55));
      transform-style: preserve-3d;
    }

    .book::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      background: linear-gradient(
        90deg,
        transparent 30%,
        rgba(255, 255, 255, 0.18) 50%,
        rgba(0, 0, 0, 0.32) 70%,
        transparent
      );
    }

    .book.turn-next {
      animation: turnNext 0.48s ease;
    }

    .book.turn-prev {
      animation: turnPrev 0.48s ease;
    }

    .book.turn-next::after,
    .book.turn-prev::after {
      animation: pageShine 0.48s ease;
    }

    @keyframes turnNext {
      0% {
        transform: rotateY(0deg) scale(1);
      }

      45% {
        transform: rotateY(-8deg) scale(0.985);
      }

      100% {
        transform: rotateY(0deg) scale(1);
      }
    }

    @keyframes turnPrev {
      0% {
        transform: rotateY(0deg) scale(1);
      }

      45% {
        transform: rotateY(8deg) scale(0.985);
      }

      100% {
        transform: rotateY(0deg) scale(1);
      }
    }

    @keyframes pageShine {
      0% {
        opacity: 0;
        transform: translateX(-20%);
      }

      45% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateX(20%);
      }
    }

    .page {
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .page-left {
      transform-origin: right center;
      border-radius: 5px 0 0 5px;
      box-shadow: inset -16px 0 24px rgba(0, 0, 0, 0.14);
    }

    .page-right {
      transform-origin: left center;
      border-radius: 0 5px 5px 0;
      box-shadow: inset 16px 0 24px rgba(0, 0, 0, 0.12);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .page-number {
      position: absolute;
      right: 10px;
      bottom: 8px;
      z-index: 2;
      min-width: 25px;
      padding: 4px 7px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.62);
      color: #ffffff;
      text-align: center;
      font-size: 11px;
    }

    .page-left .page-number {
      right: auto;
      left: 10px;
    }

    .controls {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button,
    .home-button {
      min-height: 43px;
      padding: 0 19px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 3px;
      background: #ffffff;
      color: #111111;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        opacity 0.18s ease;
    }

    button:hover,
    .home-button:hover {
      transform: translateY(-2px);
      background: #dddddd;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.35;
      transform: none;
    }

    .page-status {
      min-width: 105px;
      color: #cccccc;
      text-align: center;
      font-size: 13px;
    }

    .fullscreen-button {
      background: transparent;
      color: #ffffff;
    }

    footer {
      min-height: 55px;
      padding: 15px;
      color: #777777;
      text-align: center;
      font-size: 11px;
    }

    @media (max-width: 800px) {
      header {
        min-height: 60px;
        padding: 13px 18px;
      }

      .issue-name {
        font-size: 10px;
        letter-spacing: 1px;
      }

      main {
        min-height: calc(100vh - 115px);
        padding: 15px 10px;
      }

      .page {
        border-radius: 4px;
        box-shadow: none;
      }

      .page-right {
        display: none;
      }

      .controls {
        margin-top: 15px;
        gap: 7px;
      }

      button,
      .home-button {
        min-height: 41px;
        padding: 0 13px;
        font-size: 12px;
      }

      .page-status {
        min-width: 75px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <header>
    <a class="logo" href="index.html">dB <span>Dergi</span></a>
    <div class="issue-name" id="issueName">Sayı 01</div>
  </header>

  <main>
    <div class="loading" id="loading">
      Dergi hazırlanıyor…
    </div>

    <div class="book-area">
      <div class="book" id="book">

        <div class="page page-left" id="leftPage">
          <canvas id="leftCanvas"></canvas>
          <div class="page-number" id="leftNumber"></div>
        </div>

        <div class="page page-right" id="rightPage">
          <canvas id="rightCanvas"></canvas>
          <div class="page-number" id="rightNumber"></div>
        </div>

      </div>
    </div>

    <div class="controls">
      <a class="home-button" href="index.html">
        Ana Sayfa
      </a>

      <button id="previousButton" type="button">
        ← Önceki
      </button>

      <div class="page-status" id="pageStatus">
        — / —
      </div>

      <button id="nextButton" type="button">
        Sonraki →
      </button>

      <button class="fullscreen-button" id="fullscreenButton" type="button">
        Tam Ekran
      </button>
    </div>
  </main>

  <footer>
    Sayfaları çevirmek için düğmeleri veya klavyedeki yön tuşlarını kullan.
  </footer>

  <script type="module">
    import * as pdfjsLib from
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.mjs";

    const parameters = new URLSearchParams(window.location.search);
    const requestedIssue = parameters.get("issue") || "sayi-1.pdf";

    const safeIssueName =
      /^[a-z0-9._-]+\.pdf$/i.test(requestedIssue)
        ? requestedIssue
        : "sayi-1.pdf";

    const pdfAddress = "/assets/" + safeIssueName;

    const issueMatch = safeIssueName.match(/sayi-(\d+)\.pdf$/i);
    const issueNumber = issueMatch ? Number(issueMatch[1]) : 1;
    const issueLabel =
      "Sayı " + String(issueNumber).padStart(2, "0");

    document.title = "dB Dergi · " + issueLabel;
    document.getElementById("issueName").textContent = issueLabel;

    const book = document.getElementById("book");
    const loading = document.getElementById("loading");

    const leftPage = document.getElementById("leftPage");
    const rightPage = document.getElementById("rightPage");

    const leftCanvas = document.getElementById("leftCanvas");
    const rightCanvas = document.getElementById("rightCanvas");

    const leftNumber = document.getElementById("leftNumber");
    const rightNumber = document.getElementById("rightNumber");

    const previousButton = document.getElementById("previousButton");
    const nextButton = document.getElementById("nextButton");
    const fullscreenButton = document.getElementById("fullscreenButton");

    const pageStatus = document.getElementById("pageStatus");

    let pdfDocument = null;
    let currentPage = 1;
    let rendering = false;
    let resizeTimer = null;

    function mobileMode() {
      return window.innerWidth <= 800;
    }

    async function drawPage(pageNumber, canvas, pageContainer) {
      const page = await pdfDocument.getPage(pageNumber);
      const originalViewport = page.getViewport({ scale: 1 });

      const maximumWidth = mobileMode()
        ? Math.min(window.innerWidth - 30, 700)
        : Math.min((window.innerWidth - 90) / 2, 570);

      const maximumHeight = Math.max(window.innerHeight - 235, 350);

      const displayScale = Math.min(
        maximumWidth / originalViewport.width,
        maximumHeight / originalViewport.height
      );

      const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);

      const renderViewport = page.getViewport({
        scale: displayScale * pixelRatio
      });

      const displayWidth = renderViewport.width / pixelRatio;
      const displayHeight = renderViewport.height / pixelRatio;

      canvas.width = Math.floor(renderViewport.width);
      canvas.height = Math.floor(renderViewport.height);

      canvas.style.width = displayWidth + "px";
      canvas.style.height = displayHeight + "px";

      pageContainer.style.width = displayWidth + "px";
      pageContainer.style.height = displayHeight + "px";

      const context = canvas.getContext("2d");

      context.clearRect(0, 0, canvas.width, canvas.height);

      await page.render({
        canvasContext: context,
        viewport: renderViewport
      }).promise;
    }

    async function showPages() {
      if (!pdfDocument || rendering) {
        return;
      }

      rendering = true;
      loading.textContent = "Sayfalar hazırlanıyor…";

      try {
        if (mobileMode()) {
          leftPage.style.display = "block";
          rightPage.style.display = "none";

          await drawPage(currentPage, leftCanvas, leftPage);

          leftNumber.textContent = currentPage;
          pageStatus.textContent =
            currentPage + " / " + pdfDocument.numPages;
        } else if (currentPage === 1) {
          leftPage.style.display = "none";
          rightPage.style.display = "block";

          await drawPage(1, rightCanvas, rightPage);

          rightNumber.textContent = "1";
          pageStatus.textContent =
            "1 / " + pdfDocument.numPages;
        } else {
          leftPage.style.display = "block";
          rightPage.style.display =
            currentPage + 1 <= pdfDocument.numPages
              ? "block"
              : "none";

          await drawPage(currentPage, leftCanvas, leftPage);
          leftNumber.textContent = currentPage;

          if (currentPage + 1 <= pdfDocument.numPages) {
            await drawPage(
              currentPage + 1,
              rightCanvas,
              rightPage
            );

            rightNumber.textContent = currentPage + 1;

            pageStatus.textContent =
              currentPage +
              "–" +
              (currentPage + 1) +
              " / " +
              pdfDocument.numPages;
          } else {
            pageStatus.textContent =
              currentPage + " / " + pdfDocument.numPages;
          }
        }

        previousButton.disabled = currentPage <= 1;

        if (mobileMode()) {
          nextButton.disabled =
            currentPage >= pdfDocument.numPages;
        } else {
          nextButton.disabled =
            currentPage >= pdfDocument.numPages ||
            currentPage + 1 >= pdfDocument.numPages;
        }

        loading.textContent = "";
      } catch (error) {
        console.error(error);
        loading.textContent =
          "Sayfa yüklenemedi. Lütfen sayfayı yenile.";
      }

      rendering = false;
    }

    function changePage(direction) {
      if (!pdfDocument || rendering) {
        return;
      }

      if (direction === "next") {
        if (mobileMode()) {
          if (currentPage < pdfDocument.numPages) {
            currentPage += 1;
          }
        } else if (currentPage === 1) {
          currentPage = 2;
        } else if (currentPage + 2 <= pdfDocument.numPages) {
          currentPage += 2;
        }

        book.classList.add("turn-next");
      } else {
        if (mobileMode()) {
          if (currentPage > 1) {
            currentPage -= 1;
          }
        } else if (currentPage <= 2) {
          currentPage = 1;
        } else {
          currentPage -= 2;
        }

        book.classList.add("turn-prev");
      }

      window.setTimeout(async () => {
        await showPages();

        book.classList.remove("turn-next");
        book.classList.remove("turn-prev");
      }, 230);
    }

    previousButton.addEventListener("click", () => {
      changePage("previous");
    });

    nextButton.addEventListener("click", () => {
      changePage("next");
    });

    leftPage.addEventListener("click", () => {
      changePage("previous");
    });

    rightPage.addEventListener("click", () => {
      changePage("next");
    });

    document.addEventListener("keydown", event => {
      if (event.key === "ArrowRight") {
        changePage("next");
      }

      if (event.key === "ArrowLeft") {
        changePage("previous");
      }
    });

    fullscreenButton.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          fullscreenButton.textContent = "Tam Ekrandan Çık";
        } else {
          await document.exitFullscreen();
          fullscreenButton.textContent = "Tam Ekran";
        }
      } catch (error) {
        console.error(error);
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) {
        fullscreenButton.textContent = "Tam Ekran";
      }
    });

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        showPages();
      }, 250);
    });

    async function startReader() {
      try {
        loading.textContent = "Dergi yükleniyor…";

        pdfDocument = await pdfjsLib
          .getDocument({ url: pdfAddress })
          .promise;

        await showPages();
      } catch (error) {
        console.error(error);

        loading.textContent =
          "Dergi yüklenemedi. PDF dosyasının adını kontrol et.";
      }
    }

    startReader();
  </script>

</body>
</html>
