<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dB Dergi</title>

  <link rel="icon" type="image/png" href="assets/favicon.png?v=3">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #292929 0%, #111111 44%, #050505 100%);
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      min-height: 68px;
      padding: 14px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(0, 0, 0, 0.76);
      backdrop-filter: blur(14px);
    }

    .logo {
      color: #ffffff;
      text-decoration: none;
      font-size: 23px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span {
      font-weight: 400;
    }

    .issue-name {
      color: #b9b9b9;
      font-size: 12px;
      letter-spacing: 2px;
      text-align: right;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      min-height: calc(100vh - 124px);
      padding: 22px 20px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading {
      min-height: 32px;
      margin-bottom: 10px;
      color: #a9a9a9;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .book-area {
      width: 100%;
      display: flex;
      justify-content: center;
      perspective: 2200px;
    }

    .book {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 26px 38px rgba(0, 0, 0, 0.58));
      transform-style: preserve-3d;
      isolation: isolate;
    }

    .book::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      z-index: 8;
      width: 1px;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(0, 0, 0, 0.34) 12%,
        rgba(0, 0, 0, 0.34) 88%,
        transparent
      );
      box-shadow:
        -5px 0 15px rgba(0, 0, 0, 0.15),
        5px 0 15px rgba(255, 255, 255, 0.04);
    }

    .page {
      position: relative;
      overflow: hidden;
      background: #ffffff;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .page-left {
      border-radius: 5px 0 0 5px;
      box-shadow:
        inset -18px 0 25px rgba(0, 0, 0, 0.13),
        -1px 0 0 rgba(255, 255, 255, 0.65);
    }

    .page-right {
      border-radius: 0 5px 5px 0;
      box-shadow:
        inset 18px 0 25px rgba(0, 0, 0, 0.11),
        1px 0 0 rgba(255, 255, 255, 0.65);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .page-number {
      position: absolute;
      right: 10px;
      bottom: 8px;
      z-index: 2;
      min-width: 25px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      color: #ffffff;
      text-align: center;
      font-size: 10px;
      line-height: 1;
    }

    .page-left .page-number {
      right: auto;
      left: 10px;
    }

    .flip-sheet {
      position: absolute;
      z-index: 30;
      pointer-events: none;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, filter, border-radius;
    }

    .flip-face {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #ffffff;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .flip-face.front {
      transform: rotateY(0deg);
    }

    .flip-face.back {
      transform: rotateY(180deg);
    }

    .flip-sheet.next .flip-face {
      border-radius: 0 5px 5px 0;
    }

    .flip-sheet.previous .flip-face {
      border-radius: 5px 0 0 5px;
    }

    .flip-sheet canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .flip-page-number {
      position: absolute;
      right: 10px;
      bottom: 8px;
      min-width: 25px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      color: #ffffff;
      text-align: center;
      font-size: 10px;
      line-height: 1;
    }

    .flip-face.side-left .flip-page-number {
      right: auto;
      left: 10px;
    }

    .flip-sheet::before,
    .flip-sheet::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 4;
      width: 42%;
      opacity: 0;
      pointer-events: none;
    }

    .flip-sheet.next::before {
      left: 0;
      background: linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.34),
        rgba(0, 0, 0, 0.08) 38%,
        transparent
      );
    }

    .flip-sheet.next::after {
      right: 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.34) 48%,
        rgba(0, 0, 0, 0.24)
      );
    }

    .flip-sheet.previous::before {
      right: 0;
      background: linear-gradient(
        270deg,
        rgba(0, 0, 0, 0.34),
        rgba(0, 0, 0, 0.08) 38%,
        transparent
      );
    }

    .flip-sheet.previous::after {
      left: 0;
      background: linear-gradient(
        270deg,
        transparent,
        rgba(255, 255, 255, 0.34) 48%,
        rgba(0, 0, 0, 0.24)
      );
    }

    .flip-sheet.next {
      transform-origin: left center;
    }

    .flip-sheet.previous {
      transform-origin: right center;
    }

    .flip-sheet.next.is-turning {
      animation:
        curlNext 1.05s cubic-bezier(0.22, 0.61, 0.36, 1)
        forwards;
    }

    .flip-sheet.previous.is-turning {
      animation:
        curlPrevious 1.05s cubic-bezier(0.22, 0.61, 0.36, 1)
        forwards;
    }

    .flip-sheet.is-turning::before {
      animation:
        movingCrease 1.05s ease-in-out forwards;
    }

    .flip-sheet.is-turning::after {
      animation:
        movingHighlight 1.05s ease-in-out forwards;
    }

    @keyframes curlNext {
      0% {
        transform:
          translate3d(0, 0, 2px)
          rotateY(0deg)
          scaleX(1)
          skewY(0deg);
        border-radius: 0 5px 5px 0;
        filter:
          brightness(1)
          drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
      }

      18% {
        transform:
          translate3d(-1%, 0, 10px)
          rotateY(-22deg)
          scaleX(0.985)
          skewY(-0.45deg);
        border-radius: 0 12px 12px 0;
        filter:
          brightness(0.97)
          drop-shadow(7px 8px 10px rgba(0, 0, 0, 0.20));
      }

      48% {
        transform:
          translate3d(-5%, 0, 38px)
          rotateY(-92deg)
          scaleX(0.89)
          skewY(-2deg);
        border-radius: 0 32px 32px 0;
        filter:
          brightness(0.82)
          drop-shadow(18px 12px 22px rgba(0, 0, 0, 0.36));
      }

      76% {
        transform:
          translate3d(-2.4%, 0, 18px)
          rotateY(-151deg)
          scaleX(0.965)
          skewY(-0.7deg);
        border-radius: 14px 7px 7px 14px;
        filter:
          brightness(0.91)
          drop-shadow(8px 7px 12px rgba(0, 0, 0, 0.23));
      }

      100% {
        transform:
          translate3d(0, 0, 2px)
          rotateY(-180deg)
          scaleX(1)
          skewY(0deg);
        border-radius: 5px 0 0 5px;
        filter:
          brightness(1)
          drop-shadow(0 1px 2px rgba(0, 0, 0, 0.06));
      }
    }

    @keyframes curlPrevious {
      0% {
        transform:
          translate3d(0, 0, 2px)
          rotateY(0deg)
          scaleX(1)
          skewY(0deg);
        border-radius: 5px 0 0 5px;
        filter:
          brightness(1)
          drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
      }

      18% {
        transform:
          translate3d(1%, 0, 10px)
          rotateY(22deg)
          scaleX(0.985)
          skewY(0.45deg);
        border-radius: 12px 0 0 12px;
        filter:
          brightness(0.97)
          drop-shadow(-7px 8px 10px rgba(0, 0, 0, 0.20));
      }

      48% {
        transform:
          translate3d(5%, 0, 38px)
          rotateY(92deg)
          scaleX(0.89)
          skewY(2deg);
        border-radius: 32px 0 0 32px;
        filter:
          brightness(0.82)
          drop-shadow(-18px 12px 22px rgba(0, 0, 0, 0.36));
      }

      76% {
        transform:
          translate3d(2.4%, 0, 18px)
          rotateY(151deg)
          scaleX(0.965)
          skewY(0.7deg);
        border-radius: 7px 14px 14px 7px;
        filter:
          brightness(0.91)
          drop-shadow(-8px 7px 12px rgba(0, 0, 0, 0.23));
      }

      100% {
        transform:
          translate3d(0, 0, 2px)
          rotateY(180deg)
          scaleX(1)
          skewY(0deg);
        border-radius: 0 5px 5px 0;
        filter:
          brightness(1)
          drop-shadow(0 1px 2px rgba(0, 0, 0, 0.06));
      }
    }

    @keyframes movingCrease {
      0% {
        opacity: 0;
        transform: translateX(0);
      }

      24% {
        opacity: 0.34;
      }

      52% {
        opacity: 0.78;
        transform: translateX(38%);
      }

      100% {
        opacity: 0;
        transform: translateX(72%);
      }
    }

    @keyframes movingHighlight {
      0% {
        opacity: 0;
        transform: translateX(-28%);
      }

      38% {
        opacity: 0.22;
      }

      58% {
        opacity: 0.62;
      }

      100% {
        opacity: 0;
        transform: translateX(26%);
      }
    }

    .controls {
      margin-top: 20px;
      padding: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(16px);
    }

    .control-button,
    .home-button {
      min-height: 38px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #d7d7d7;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      text-decoration: none;
      transition:
        color 0.18s ease,
        background 0.18s ease,
        transform 0.18s ease,
        opacity 0.18s ease;
    }

    .control-button:hover,
    .home-button:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.10);
      transform: translateY(-1px);
    }

    .control-button:focus-visible,
    .home-button:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.28;
      transform: none;
      background: transparent;
    }

    .control-icon {
      font-size: 15px;
      line-height: 1;
    }

    .page-status {
      min-width: 96px;
      padding: 0 12px;
      color: #9f9f9f;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.8px;
    }

    footer {
      min-height: 48px;
      padding: 13px;
      color: #686868;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 800px) {
      header {
        min-height: 60px;
        padding: 13px 18px;
      }

      .issue-name {
        max-width: 58%;
        font-size: 9px;
        letter-spacing: 1.2px;
      }

      main {
        min-height: calc(100vh - 108px);
        padding: 14px 9px 12px;
      }

      .book::before {
        display: none;
      }

      .page {
        border-radius: 4px;
        box-shadow: none;
      }

      .page-right {
        display: none;
      }

      .controls {
        margin-top: 14px;
        gap: 2px;
      }

      .control-button,
      .home-button {
        min-height: 36px;
        padding: 0 11px;
        font-size: 11px;
      }

      .control-label {
        display: none;
      }

      .page-status {
        min-width: 70px;
        padding: 0 6px;
        font-size: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .flip-sheet.is-turning,
      .flip-sheet.is-turning::before,
      .flip-sheet.is-turning::after {
        animation-duration: 0.01ms;
      }
    }
  </style>
</head>

<body>

  <header>
    <a class="logo" href="index.html">dB <span>Dergi</span></a>
    <div class="issue-name" id="issueName">ISSUE #001 · 22 Temmuz 2026</div>
  </header>

  <main>
    <div class="loading" id="loading">
      Dergi hazırlanıyor…
    </div>

    <div class="book-area">
      <div class="book" id="book">

        <div class="page page-left" id="leftPage">
          <canvas id="leftCanvas"></canvas>
          <div class="page-number" id="leftNumber"></div>
        </div>

        <div class="page page-right" id="rightPage">
          <canvas id="rightCanvas"></canvas>
          <div class="page-number" id="rightNumber"></div>
        </div>

      </div>
    </div>

    <div class="controls" aria-label="Dergi kontrolleri">
      <a class="home-button" href="index.html" aria-label="Ana sayfaya dön">
        <span class="control-icon">⌂</span>
        <span class="control-label">Ana sayfa</span>
      </a>

      <button
        class="control-button"
        id="previousButton"
        type="button"
        aria-label="Önceki sayfaya geç"
      >
        <span class="control-icon">←</span>
        <span class="control-label">Önceki</span>
      </button>

      <div class="page-status" id="pageStatus">
        — / —
      </div>

      <button
        class="control-button"
        id="nextButton"
        type="button"
        aria-label="Sonraki sayfaya geç"
      >
        <span class="control-label">Sonraki</span>
        <span class="control-icon">→</span>
      </button>

      <button
        class="control-button"
        id="fullscreenButton"
        type="button"
        aria-label="Tam ekranı aç veya kapat"
      >
        <span class="control-icon">⛶</span>
        <span class="control-label" id="fullscreenLabel">Tam ekran</span>
      </button>
    </div>
  </main>

  <footer>
    Yön tuşlarını veya sayfaların kenarlarını kullanarak ilerleyebilirsin.
  </footer>

  <script type="module">
    import * as pdfjsLib from
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.mjs";

    const parameters =
      new URLSearchParams(window.location.search);

    const requestedIssue =
      parameters.get("issue") ||
      "sayi-1-2026-07-22.pdf";

    const safeIssueName =
      /^[a-z0-9._-]+\.pdf$/i.test(requestedIssue)
        ? requestedIssue
        : "sayi-1-2026-07-22.pdf";

    const pdfAddress =
      "/assets/" + safeIssueName;

    const issueMatch =
      safeIssueName.match(
        /^sayi-(\d+)(?:-(\d{4})-(\d{2})-(\d{2}))?\.pdf$/i
      );

    const issueNumber =
      issueMatch ? Number(issueMatch[1]) : 1;

    const issueLabel =
      "ISSUE #" +
      String(issueNumber).padStart(3, "0");

    let issueDate = "";

    if (
      issueMatch &&
      issueMatch[2] &&
      issueMatch[3] &&
      issueMatch[4]
    ) {
      const date =
        new Date(
          Date.UTC(
            Number(issueMatch[2]),
            Number(issueMatch[3]) - 1,
            Number(issueMatch[4])
          )
        );

      issueDate =
        new Intl.DateTimeFormat("tr-TR", {
          day: "numeric",
          month: "long",
          year: "numeric",
          timeZone: "UTC"
        }).format(date);
    }

    const fullIssueLabel =
      issueDate
        ? issueLabel + " · " + issueDate
        : issueLabel;

    document.title =
      "dB Dergi · " + issueLabel;

    document
      .getElementById("issueName")
      .textContent = fullIssueLabel;

    const book =
      document.getElementById("book");

    const loading =
      document.getElementById("loading");

    const leftPage =
      document.getElementById("leftPage");

    const rightPage =
      document.getElementById("rightPage");

    const leftCanvas =
      document.getElementById("leftCanvas");

    const rightCanvas =
      document.getElementById("rightCanvas");

    const leftNumber =
      document.getElementById("leftNumber");

    const rightNumber =
      document.getElementById("rightNumber");

    const previousButton =
      document.getElementById("previousButton");

    const nextButton =
      document.getElementById("nextButton");

    const fullscreenButton =
      document.getElementById("fullscreenButton");

    const fullscreenLabel =
      document.getElementById("fullscreenLabel");

    const pageStatus =
      document.getElementById("pageStatus");

    let pdfDocument = null;
    let currentPage = 1;
    let rendering = false;
    let transitioning = false;
    let resizeTimer = null;

    function mobileMode() {
      return window.innerWidth <= 800;
    }

    function setPageVisibility(
      pageContainer,
      visible
    ) {
      pageContainer.style.display = "block";
      pageContainer.style.visibility =
        visible ? "visible" : "hidden";
    }

    function copyPageSize(
      source,
      destination
    ) {
      destination.style.width =
        source.style.width;

      destination.style.height =
        source.style.height;
    }

    async function drawPage(
      pageNumber,
      canvas,
      pageContainer
    ) {
      const page =
        await pdfDocument.getPage(pageNumber);

      const originalViewport =
        page.getViewport({ scale: 1 });

      const maximumWidth =
        mobileMode()
          ? Math.min(window.innerWidth - 28, 700)
          : Math.min(
              (window.innerWidth - 84) / 2,
              570
            );

      const maximumHeight =
        Math.max(
          window.innerHeight - 218,
          340
        );

      const displayScale =
        Math.min(
          maximumWidth / originalViewport.width,
          maximumHeight / originalViewport.height
        );

      const pixelRatio =
        Math.min(
          window.devicePixelRatio || 1,
          2
        );

      const renderViewport =
        page.getViewport({
          scale: displayScale * pixelRatio
        });

      const displayWidth =
        renderViewport.width / pixelRatio;

      const displayHeight =
        renderViewport.height / pixelRatio;

      canvas.width =
        Math.floor(renderViewport.width);

      canvas.height =
        Math.floor(renderViewport.height);

      canvas.style.width =
        displayWidth + "px";

      canvas.style.height =
        displayHeight + "px";

      pageContainer.style.width =
        displayWidth + "px";

      pageContainer.style.height =
        displayHeight + "px";

      const context =
        canvas.getContext("2d", {
          alpha: false
        });

      context.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      await page.render({
        canvasContext: context,
        viewport: renderViewport
      }).promise;
    }

    function updateControls() {
      previousButton.disabled =
        currentPage <= 1 ||
        transitioning;

      if (mobileMode()) {
        nextButton.disabled =
          currentPage >= pdfDocument.numPages ||
          transitioning;
      } else {
        nextButton.disabled =
          currentPage >= pdfDocument.numPages ||
          currentPage + 1 >= pdfDocument.numPages ||
          transitioning;
      }
    }

    async function showPages(
      announce = true
    ) {
      if (!pdfDocument || rendering) {
        return;
      }

      rendering = true;

      if (announce) {
        loading.textContent =
          "Sayfalar hazırlanıyor…";
      }

      try {
        if (mobileMode()) {
          leftPage.style.display = "block";
          leftPage.style.visibility = "visible";
          rightPage.style.display = "none";

          await drawPage(
            currentPage,
            leftCanvas,
            leftPage
          );

          leftNumber.textContent =
            currentPage;

          pageStatus.textContent =
            currentPage +
            " / " +
            pdfDocument.numPages;
        } else if (currentPage === 1) {
          setPageVisibility(
            leftPage,
            false
          );

          setPageVisibility(
            rightPage,
            true
          );

          await drawPage(
            1,
            rightCanvas,
            rightPage
          );

          copyPageSize(
            rightPage,
            leftPage
          );

          leftNumber.textContent = "";
          rightNumber.textContent = "1";

          pageStatus.textContent =
            "1 / " +
            pdfDocument.numPages;
        } else {
          setPageVisibility(
            leftPage,
            true
          );

          setPageVisibility(
            rightPage,
            true
          );

          await drawPage(
            currentPage,
            leftCanvas,
            leftPage
          );

          leftNumber.textContent =
            currentPage;

          if (
            currentPage + 1 <=
            pdfDocument.numPages
          ) {
            await drawPage(
              currentPage + 1,
              rightCanvas,
              rightPage
            );

            rightNumber.textContent =
              currentPage + 1;

            pageStatus.textContent =
              currentPage +
              "–" +
              (currentPage + 1) +
              " / " +
              pdfDocument.numPages;
          } else {
            setPageVisibility(
              rightPage,
              false
            );

            copyPageSize(
              leftPage,
              rightPage
            );

            rightNumber.textContent = "";

            pageStatus.textContent =
              currentPage +
              " / " +
              pdfDocument.numPages;
          }
        }

        updateControls();
        loading.textContent = "";
      } catch (error) {
        console.error(error);

        loading.textContent =
          "Sayfa yüklenemedi. Lütfen sayfayı yenile.";
      }

      rendering = false;
    }

    function getTargetPage(direction) {
      if (direction === "next") {
        if (mobileMode()) {
          return Math.min(
            currentPage + 1,
            pdfDocument.numPages
          );
        }

        if (currentPage === 1) {
          return Math.min(
            2,
            pdfDocument.numPages
          );
        }

        if (
          currentPage + 2 <=
          pdfDocument.numPages
        ) {
          return currentPage + 2;
        }

        return currentPage;
      }

      if (mobileMode()) {
        return Math.max(
          currentPage - 1,
          1
        );
      }

      if (currentPage <= 2) {
        return 1;
      }

      return Math.max(
        currentPage - 2,
        1
      );
    }

    async function renderFlipCanvas(
      pageNumber,
      canvas,
      cssWidth,
      cssHeight
    ) {
      const page =
        await pdfDocument.getPage(pageNumber);

      const originalViewport =
        page.getViewport({ scale: 1 });

      const pixelRatio =
        Math.min(
          window.devicePixelRatio || 1,
          2
        );

      const scale =
        Math.min(
          (cssWidth * pixelRatio) /
            originalViewport.width,
          (cssHeight * pixelRatio) /
            originalViewport.height
        );

      const viewport =
        page.getViewport({ scale });

      canvas.width =
        Math.floor(viewport.width);

      canvas.height =
        Math.floor(viewport.height);

      canvas.style.width =
        cssWidth + "px";

      canvas.style.height =
        cssHeight + "px";

      const context =
        canvas.getContext("2d", {
          alpha: false
        });

      await page.render({
        canvasContext: context,
        viewport
      }).promise;
    }

    function addFlipPageNumber(
      face,
      pageNumber
    ) {
      if (!pageNumber) {
        return;
      }

      const number =
        document.createElement("div");

      number.className =
        "flip-page-number";

      number.textContent =
        pageNumber;

      face.appendChild(number);
    }

    async function createFlipSheet(
      direction,
      targetPage
    ) {
      const isMobile =
        mobileMode();

      const sourcePage =
        isMobile
          ? leftPage
          : direction === "next"
            ? rightPage
            : leftPage;

      const sourceCanvas =
        isMobile
          ? leftCanvas
          : direction === "next"
            ? rightCanvas
            : leftCanvas;

      const sourceNumber =
        isMobile
          ? leftNumber.textContent
          : direction === "next"
            ? rightNumber.textContent
            : leftNumber.textContent;

      if (
        sourcePage.style.visibility ===
        "hidden"
      ) {
        return null;
      }

      const sourceRect =
        sourcePage.getBoundingClientRect();

      const bookRect =
        book.getBoundingClientRect();

      const sheet =
        document.createElement("div");

      sheet.className =
        "flip-sheet " + direction;

      sheet.style.left =
        sourceRect.left -
        bookRect.left +
        "px";

      sheet.style.top =
        sourceRect.top -
        bookRect.top +
        "px";

      sheet.style.width =
        sourceRect.width + "px";

      sheet.style.height =
        sourceRect.height + "px";

      const front =
        document.createElement("div");

      front.className =
        "flip-face front " +
        (
          !isMobile &&
          direction === "previous"
            ? "side-left"
            : "side-right"
        );

      const frontCanvas =
        document.createElement("canvas");

      frontCanvas.width =
        sourceCanvas.width;

      frontCanvas.height =
        sourceCanvas.height;

      frontCanvas.style.width =
        sourceRect.width + "px";

      frontCanvas.style.height =
        sourceRect.height + "px";

      const frontContext =
        frontCanvas.getContext("2d", {
          alpha: false
        });

      frontContext.drawImage(
        sourceCanvas,
        0,
        0
      );

      front.appendChild(
        frontCanvas
      );

      addFlipPageNumber(
        front,
        sourceNumber
      );

      const back =
        document.createElement("div");

      const backIsLeft =
        !isMobile &&
        direction === "next";

      back.className =
        "flip-face back " +
        (
          backIsLeft
            ? "side-left"
            : "side-right"
        );

      const backCanvas =
        document.createElement("canvas");

      let backPageNumber =
        targetPage;

      if (
        !isMobile &&
        direction === "previous" &&
        targetPage > 1
      ) {
        backPageNumber =
          targetPage + 1;
      }

      backPageNumber =
        Math.min(
          backPageNumber,
          pdfDocument.numPages
        );

      await renderFlipCanvas(
        backPageNumber,
        backCanvas,
        sourceRect.width,
        sourceRect.height
      );

      back.appendChild(
        backCanvas
      );

      addFlipPageNumber(
        back,
        backPageNumber
      );

      sheet.appendChild(front);
      sheet.appendChild(back);
      book.appendChild(sheet);

      return sheet;
    }

    function waitForAnimation(element) {
      return new Promise(resolve => {
        if (!element) {
          resolve();
          return;
        }

        let finished = false;

        const finish = () => {
          if (finished) {
            return;
          }

          finished = true;
          resolve();
        };

        const handleAnimationEnd =
          event => {
            if (
              event.animationName ===
                "curlNext" ||
              event.animationName ===
                "curlPrevious"
            ) {
              finish();
            }
          };

        element.addEventListener(
          "animationend",
          handleAnimationEnd,
          { once: true }
        );

        window.setTimeout(
          finish,
          1350
        );
      });
    }

    function startFlipAnimation(sheet) {
      if (!sheet) {
        return;
      }

      void sheet.offsetWidth;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          sheet.classList.add(
            "is-turning"
          );
        });
      });
    }

    async function changePage(direction) {
      if (
        !pdfDocument ||
        rendering ||
        transitioning
      ) {
        return;
      }

      const targetPage =
        getTargetPage(direction);

      if (targetPage === currentPage) {
        return;
      }

      transitioning = true;
      updateControls();

      const flipSheet =
        await createFlipSheet(
          direction,
          targetPage
        );

      currentPage = targetPage;

      await showPages(false);

      const animationFinished =
        waitForAnimation(
          flipSheet
        );

      startFlipAnimation(
        flipSheet
      );

      await animationFinished;

      if (flipSheet) {
        flipSheet.remove();
      }

      transitioning = false;
      updateControls();
    }

    previousButton.addEventListener(
      "click",
      () => {
        changePage("previous");
      }
    );

    nextButton.addEventListener(
      "click",
      () => {
        changePage("next");
      }
    );

    leftPage.addEventListener(
      "click",
      () => {
        changePage("previous");
      }
    );

    rightPage.addEventListener(
      "click",
      () => {
        changePage("next");
      }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (event.key === "ArrowRight") {
          changePage("next");
        }

        if (event.key === "ArrowLeft") {
          changePage("previous");
        }
      }
    );

    fullscreenButton.addEventListener(
      "click",
      async () => {
        try {
          if (
            !document.fullscreenElement
          ) {
            await document
              .documentElement
              .requestFullscreen();
          } else {
            await document
              .exitFullscreen();
          }
        } catch (error) {
          console.error(error);
        }
      }
    );

    document.addEventListener(
      "fullscreenchange",
      () => {
        fullscreenLabel.textContent =
          document.fullscreenElement
            ? "Tam ekrandan çık"
            : "Tam ekran";
      }
    );

    window.addEventListener(
      "resize",
      () => {
        clearTimeout(resizeTimer);

        resizeTimer =
          window.setTimeout(() => {
            if (!transitioning) {
              showPages(false);
            }
          }, 260);
      }
    );

    async function startReader() {
      try {
        loading.textContent =
          "Dergi yükleniyor…";

        pdfDocument =
          await pdfjsLib
            .getDocument({
              url: pdfAddress
            })
            .promise;

        await showPages();
      } catch (error) {
        console.error(error);

        loading.textContent =
          "Dergi yüklenemedi. PDF dosyasının adını kontrol et.";
      }
    }

    startReader();
  </script>

</body>
