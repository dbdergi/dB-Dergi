<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dB Dergi</title>

  <link rel="icon" type="image/png" href="assets/favicon.png?v=4">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #292929 0%, #111111 44%, #050505 100%);
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      min-height: 68px;
      padding: 14px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(0, 0, 0, 0.76);
      backdrop-filter: blur(14px);
    }

    .logo {
      color: #ffffff;
      text-decoration: none;
      font-size: 23px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span {
      font-weight: 400;
    }

    .issue-name {
      color: #b9b9b9;
      font-size: 12px;
      letter-spacing: 2px;
      text-align: right;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      min-height: calc(100vh - 116px);
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading {
      min-height: 34px;
      margin-bottom: 8px;
      color: #aaaaaa;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.8px;
    }

    .book-stage {
      position: relative;
      width: min(1240px, calc(100vw - 28px));
      height: calc(100vh - 192px);
      min-height: 390px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2600px;
    }

    #book {
      margin: auto;
      filter: drop-shadow(0 27px 38px rgba(0, 0, 0, 0.58));
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #book canvas {
      display: block;
    }

    .controls {
      margin-top: 14px;
      padding: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(16px);
    }

    .control-button,
    .home-button {
      min-height: 38px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #d7d7d7;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      text-decoration: none;
      transition:
        color 0.18s ease,
        background 0.18s ease,
        transform 0.18s ease,
        opacity 0.18s ease;
    }

    .control-button:hover,
    .home-button:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.10);
      transform: translateY(-1px);
    }

    .control-button:focus-visible,
    .home-button:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.28;
      transform: none;
      background: transparent;
    }

    .control-icon {
      font-size: 15px;
      line-height: 1;
    }

    .page-status {
      min-width: 96px;
      padding: 0 12px;
      color: #9f9f9f;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.8px;
    }

    footer {
      min-height: 48px;
      padding: 13px;
      color: #686868;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 800px) {
      header {
        min-height: 60px;
        padding: 13px 18px;
      }

      .issue-name {
        max-width: 58%;
        font-size: 9px;
        letter-spacing: 1.2px;
      }

      main {
        min-height: calc(100vh - 108px);
        padding: 12px 8px 10px;
      }

      .book-stage {
        width: calc(100vw - 14px);
        height: calc(100vh - 176px);
        min-height: 360px;
      }

      .controls {
        margin-top: 10px;
        gap: 2px;
      }

      .control-button,
      .home-button {
        min-height: 36px;
        padding: 0 11px;
        font-size: 11px;
      }

      .control-label {
        display: none;
      }

      .page-status {
        min-width: 70px;
        padding: 0 6px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

  <header>
    <a class="logo" href="index.html">dB <span>Dergi</span></a>
    <div class="issue-name" id="issueName">ISSUE #001 · 22 Temmuz 2026</div>
  </header>

  <main>
    <div class="loading" id="loading">
      Dergi hazırlanıyor…
    </div>

    <div class="book-stage">
      <div id="book" aria-label="dB Dergi okuyucu"></div>
    </div>

    <div class="controls" aria-label="Dergi kontrolleri">
      <a class="home-button" href="index.html" aria-label="Ana sayfaya dön">
        <span class="control-icon">⌂</span>
        <span class="control-label">Ana sayfa</span>
      </a>

      <button
        class="control-button"
        id="previousButton"
        type="button"
        aria-label="Önceki sayfaya geç"
      >
        <span class="control-icon">←</span>
        <span class="control-label">Önceki</span>
      </button>

      <div class="page-status" id="pageStatus">
        — / —
      </div>

      <button
        class="control-button"
        id="nextButton"
        type="button"
        aria-label="Sonraki sayfaya geç"
      >
        <span class="control-label">Sonraki</span>
        <span class="control-icon">→</span>
      </button>

      <button
        class="control-button"
        id="fullscreenButton"
        type="button"
        aria-label="Tam ekranı aç veya kapat"
      >
        <span class="control-icon">⛶</span>
        <span class="control-label" id="fullscreenLabel">Tam ekran</span>
      </button>
    </div>
  </main>

  <footer>
    Sayfanın köşesini tutup sürükleyerek çevirebilirsin.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <script type="module">
    import * as pdfjsLib from
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.mjs";

    const parameters =
      new URLSearchParams(window.location.search);

    const requestedIssue =
      parameters.get("issue") ||
      "sayi-1-2026-07-22.pdf";

    const safeIssueName =
      /^[a-z0-9._-]+\.pdf$/i.test(requestedIssue)
        ? requestedIssue
        : "sayi-1-2026-07-22.pdf";

    const pdfAddress =
      "/assets/" + safeIssueName;

    const issueBaseName =
      safeIssueName.replace(/\.pdf$/i, "");

    const generatedPagesBase =
      "/assets/pages/" +
      encodeURIComponent(issueBaseName) +
      "/";

    const generatedManifestAddress =
      generatedPagesBase +
      "manifest.json";

    const issueMatch =
      safeIssueName.match(
        /^sayi-(\d+)(?:-(\d{4})-(\d{2})-(\d{2}))?\.pdf$/i
      );

    const issueNumber =
      issueMatch ? Number(issueMatch[1]) : 1;

    const issueLabel =
      "ISSUE #" +
      String(issueNumber).padStart(3, "0");

    let issueDate = "";

    if (
      issueMatch &&
      issueMatch[2] &&
      issueMatch[3] &&
      issueMatch[4]
    ) {
      const date =
        new Date(
          Date.UTC(
            Number(issueMatch[2]),
            Number(issueMatch[3]) - 1,
            Number(issueMatch[4])
          )
        );

      issueDate =
        new Intl.DateTimeFormat("tr-TR", {
          day: "numeric",
          month: "long",
          year: "numeric",
          timeZone: "UTC"
        }).format(date);
    }

    const fullIssueLabel =
      issueDate
        ? issueLabel + " · " + issueDate
        : issueLabel;

    document.title =
      "dB Dergi · " + issueLabel;

    document
      .getElementById("issueName")
      .textContent = fullIssueLabel;

    const bookElement =
      document.getElementById("book");

    const loading =
      document.getElementById("loading");

    const previousButton =
      document.getElementById("previousButton");

    const nextButton =
      document.getElementById("nextButton");

    const fullscreenButton =
      document.getElementById("fullscreenButton");

    const fullscreenLabel =
      document.getElementById("fullscreenLabel");

    const pageStatus =
      document.getElementById("pageStatus");

    const createdImageAddresses = [];

    let pdfDocument = null;
    let pageFlip = null;

    function loadImageDimensions(
      address
    ) {
      return new Promise(
        (resolve, reject) => {
          const image =
            new Image();

          image.onload = () => {
            resolve({
              width: image.naturalWidth,
              height: image.naturalHeight
            });
          };

          image.onerror = () => {
            reject(
              new Error(
                "İlk sayfa görseli yüklenemedi."
              )
            );
          };

          image.src = address;
        }
      );
    }

    async function loadGeneratedPages() {
      const response =
        await fetch(
          generatedManifestAddress,
          {
            cache: "no-store"
          }
        );

      if (!response.ok) {
        throw new Error(
          "Hazır sayfa listesi bulunamadı."
        );
      }

      const manifest =
        await response.json();

      if (
        !manifest ||
        !Array.isArray(manifest.pages) ||
        manifest.pages.length === 0
      ) {
        throw new Error(
          "Hazır sayfa listesi geçersiz."
        );
      }

      const pageAddresses =
        manifest.pages.map(
          pageFileName => {
            return (
              generatedPagesBase +
              encodeURIComponent(pageFileName)
            );
          }
        );

      const dimensions =
        await loadImageDimensions(
          pageAddresses[0]
        );

      return {
        pageAddresses,
        pageRatio:
          dimensions.height /
          dimensions.width
      };
    }

    function canvasToBlob(
      canvas,
      type,
      quality
    ) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(
          blob => {
            if (blob) {
              resolve(blob);
            } else {
              reject(
                new Error(
                  "Sayfa görseli oluşturulamadı."
                )
              );
            }
          },
          type,
          quality
        );
      });
    }

    async function createPageImage(
      pageNumber,
      targetWidth
    ) {
      const page =
        await pdfDocument.getPage(pageNumber);

      const originalViewport =
        page.getViewport({ scale: 1 });

      const scale =
        targetWidth /
        originalViewport.width;

      const viewport =
        page.getViewport({ scale });

      const canvas =
        document.createElement("canvas");

      canvas.width =
        Math.floor(viewport.width);

      canvas.height =
        Math.floor(viewport.height);

      const context =
        canvas.getContext("2d", {
          alpha: false
        });

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;

      let blob;

      try {
        blob =
          await canvasToBlob(
            canvas,
            "image/webp",
            0.88
          );
      } catch (webpError) {
        console.warn(
          "WebP oluşturulamadı, JPEG kullanılıyor.",
          webpError
        );

        blob =
          await canvasToBlob(
            canvas,
            "image/jpeg",
            0.90
          );
      }

      canvas.width = 1;
      canvas.height = 1;

      const address =
        URL.createObjectURL(blob);

      createdImageAddresses.push(address);

      return address;
    }

    function calculatePageWidth() {
      const mobile =
        window.innerWidth <= 800;

      const availableHeight =
        Math.max(
          window.innerHeight - 205,
          430
        );

      const availableWidth =
        mobile
          ? window.innerWidth - 24
          : (window.innerWidth - 70) / 2;

      return Math.floor(
        Math.min(
          1250,
          Math.max(
            760,
            Math.min(
              availableWidth * 2,
              availableHeight * 1.45
            )
          )
        )
      );
    }

    function updatePageStatus(
      pageIndex = 0
    ) {
      if (!pageFlip) {
        return;
      }

      const pageCount =
        pageFlip.getPageCount();

      const displayedPage =
        Math.min(
          pageIndex + 1,
          pageCount
        );

      pageStatus.textContent =
        displayedPage +
        " / " +
        pageCount;

      previousButton.disabled =
        pageIndex <= 0;

      nextButton.disabled =
        pageIndex >=
        pageCount - 1;
    }

    function createReader(
      pageAddresses,
      pageRatio
    ) {
      if (
        !window.St ||
        !window.St.PageFlip
      ) {
        throw new Error(
          "Sayfa çevirme sistemi yüklenemedi."
        );
      }

      const baseWidth = 560;
      const baseHeight =
        Math.round(
          baseWidth * pageRatio
        );

      pageFlip =
        new window.St.PageFlip(
          bookElement,
          {
            width: baseWidth,
            height: baseHeight,
            size: "stretch",
            minWidth: 260,
            maxWidth: 620,
            minHeight:
              Math.round(260 * pageRatio),
            maxHeight:
              Math.round(620 * pageRatio),
            drawShadow: true,
            maxShadowOpacity: 0.46,
            flippingTime: 950,
            usePortrait: true,
            startZIndex: 10,
            autoSize: true,
            showCover: true,
            mobileScrollSupport: false,
            swipeDistance: 18,
            clickEventForward: true,
            useMouseEvents: true,
            disableFlipByClick: false
          }
        );

      pageFlip.on(
        "init",
        event => {
          updatePageStatus(
            event.data.page
          );
        }
      );

      pageFlip.on(
        "flip",
        event => {
          updatePageStatus(
            event.data
          );
        }
      );

      pageFlip.loadFromImages(
        pageAddresses
      );
    }

    previousButton.addEventListener(
      "click",
      () => {
        if (pageFlip) {
          pageFlip.flipPrev("bottom");
        }
      }
    );

    nextButton.addEventListener(
      "click",
      () => {
        if (pageFlip) {
          pageFlip.flipNext("bottom");
        }
      }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (!pageFlip) {
          return;
        }

        if (event.key === "ArrowRight") {
          pageFlip.flipNext("bottom");
        }

        if (event.key === "ArrowLeft") {
          pageFlip.flipPrev("bottom");
        }
      }
    );

    fullscreenButton.addEventListener(
      "click",
      async () => {
        try {
          if (
            !document.fullscreenElement
          ) {
            await document
              .documentElement
              .requestFullscreen();
          } else {
            await document
              .exitFullscreen();
          }
        } catch (error) {
          console.error(error);
        }
      }
    );

    document.addEventListener(
      "fullscreenchange",
      () => {
        fullscreenLabel.textContent =
          document.fullscreenElement
            ? "Tam ekrandan çık"
            : "Tam ekran";

        window.setTimeout(
          () => {
            if (pageFlip) {
              pageFlip.update();
            }
          },
          120
        );
      }
    );

    window.addEventListener(
      "resize",
      () => {
        window.clearTimeout(
          window.readerResizeTimer
        );

        window.readerResizeTimer =
          window.setTimeout(
            () => {
              if (pageFlip) {
                pageFlip.update();
              }
            },
            180
          );
      }
    );

    window.addEventListener(
      "beforeunload",
      () => {
        createdImageAddresses.forEach(
          address => {
            URL.revokeObjectURL(address);
          }
        );
      }
    );

    async function startReader() {
      try {
        loading.textContent =
          "Dergi yükleniyor…";

        try {
          const generated =
            await loadGeneratedPages();

          createReader(
            generated.pageAddresses,
            generated.pageRatio
          );

          loading.textContent =
            "Köşeyi tutup sürükleyerek sayfayı çevirebilirsin.";

          window.setTimeout(
            () => {
              loading.textContent = "";
            },
            2600
          );

          return;
        } catch (generatedError) {
          console.warn(
            "Hazır sayfalar bulunamadı, PDF hazırlanıyor.",
            generatedError
          );
        }

        pdfDocument =
          await pdfjsLib
            .getDocument({
              url: pdfAddress
            })
            .promise;

        const firstPage =
          await pdfDocument.getPage(1);

        const firstViewport =
          firstPage.getViewport({
            scale: 1
          });

        const pageRatio =
          firstViewport.height /
          firstViewport.width;

        const targetWidth =
          calculatePageWidth();

        const pageAddresses = [];

        for (
          let pageNumber = 1;
          pageNumber <=
          pdfDocument.numPages;
          pageNumber += 1
        ) {
          loading.textContent =
            "Sayfalar hazırlanıyor… " +
            pageNumber +
            " / " +
            pdfDocument.numPages;

          const address =
            await createPageImage(
              pageNumber,
              targetWidth
            );

          pageAddresses.push(address);
        }

        createReader(
          pageAddresses,
          pageRatio
        );

        loading.textContent =
          "Köşeyi tutup sürükleyerek sayfayı çevirebilirsin.";

        window.setTimeout(
          () => {
            loading.textContent = "";
          },
          2600
        );
      } catch (error) {
        console.error(error);

        loading.textContent =
          "Dergi yüklenemedi. Sayfayı yenileyip tekrar dene.";
      }
    }

    startReader();
  </script>

</body>
</html>
