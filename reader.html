<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>dB Dergi</title>

  <link rel="icon" type="image/png" href="assets/favicon.png?v=4">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #292929 0%, #111111 44%, #050505 100%);
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      min-height: 68px;
      padding: 14px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(0, 0, 0, 0.76);
      backdrop-filter: blur(14px);
    }

    .logo {
      color: #ffffff;
      text-decoration: none;
      font-size: 23px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span {
      font-weight: 400;
    }

    .issue-name {
      color: #b9b9b9;
      font-size: 12px;
      letter-spacing: 2px;
      text-align: right;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      min-height: calc(100vh - 116px);
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading {
      min-height: 34px;
      margin-bottom: 8px;
      color: #aaaaaa;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.8px;
    }

    .book-stage {
      position: relative;
      width: min(1240px, calc(100vw - 28px));
      height: calc(100vh - 192px);
      min-height: 390px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2600px;
    }

    #book {
      margin: auto;
      filter: drop-shadow(0 27px 38px rgba(0, 0, 0, 0.58));
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #book canvas {
      display: block;
    }

    #book.is-hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .closed-book {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2600px;
      pointer-events: none;
    }

    .closed-book[hidden] {
      display: none;
    }

    .closed-volume {
      position: relative;
      transform-style: preserve-3d;
      pointer-events: auto;
      filter: drop-shadow(0 28px 38px rgba(0, 0, 0, 0.58));
    }

    .closed-pages {
      position: absolute;
      inset: 5px -7px -6px 5px;
      border-radius: 2px 6px 6px 2px;
      background:
        repeating-linear-gradient(
          to bottom,
          #f6f4ee 0,
          #f6f4ee 2px,
          #dedbd3 3px,
          #f3f0e9 4px
        );
      box-shadow:
        5px 4px 0 rgba(0, 0, 0, 0.34),
        9px 8px 18px rgba(0, 0, 0, 0.35);
      transform: translateZ(-4px);
    }

    .closed-cover {
      position: absolute;
      inset: 0;
      z-index: 3;
      border-radius: 3px 7px 7px 3px;
      cursor: grab;
      transform-origin: left center;
      transform-style: preserve-3d;
      will-change: transform, filter;
      touch-action: none;
    }

    .closed-cover:active {
      cursor: grabbing;
    }

    .closed-cover-face {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: inherit;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .closed-cover-front {
      background: #111111;
      box-shadow:
        inset -4px 0 11px rgba(0, 0, 0, 0.24),
        inset 2px 0 2px rgba(255, 255, 255, 0.10);
    }

    .closed-cover-front img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .closed-cover-back {
      transform: rotateY(180deg);
      background:
        linear-gradient(
          90deg,
          #dad7cf 0%,
          #f5f3ed 8%,
          #fbfaf7 100%
        );
      box-shadow:
        inset 16px 0 24px rgba(0, 0, 0, 0.13),
        inset -1px 0 0 rgba(0, 0, 0, 0.08);
    }

    .closed-cover-back::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.34;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 3px,
          rgba(0, 0, 0, 0.025) 4px
        );
    }

    .closed-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      border-radius: inherit;
      opacity: calc(var(--cover-progress, 0) * 0.72);
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.30) 42%,
          rgba(0, 0, 0, 0.38) 100%
        );
      backface-visibility: hidden;
    }

    .closed-hint {
      position: absolute;
      right: 16px;
      bottom: 15px;
      z-index: 8;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      color: #ffffff;
      font-size: 10px;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .closed-book.is-dragging .closed-hint {
      opacity: 0;
    }

    .controls {
      margin-top: 14px;
      padding: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(16px);
    }

    .control-button,
    .home-button {
      min-height: 38px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #d7d7d7;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      text-decoration: none;
      transition:
        color 0.18s ease,
        background 0.18s ease,
        transform 0.18s ease,
        opacity 0.18s ease;
    }

    .control-button:hover,
    .home-button:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.10);
      transform: translateY(-1px);
    }

    .control-button:focus-visible,
    .home-button:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.28;
      transform: none;
      background: transparent;
    }

    .control-icon {
      font-size: 15px;
      line-height: 1;
    }

    .page-status {
      min-width: 96px;
      padding: 0 12px;
      color: #9f9f9f;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.8px;
    }

    footer {
      min-height: 48px;
      padding: 13px;
      color: #686868;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 800px) {
      header {
        min-height: 60px;
        padding: 13px 18px;
      }

      .issue-name {
        max-width: 58%;
        font-size: 9px;
        letter-spacing: 1.2px;
      }

      main {
        min-height: calc(100vh - 108px);
        padding: 12px 8px 10px;
      }

      .book-stage {
        width: calc(100vw - 14px);
        height: calc(100vh - 176px);
        min-height: 360px;
      }

      .controls {
        margin-top: 10px;
        gap: 2px;
      }

      .control-button,
      .home-button {
        min-height: 36px;
        padding: 0 11px;
        font-size: 11px;
      }

      .control-label {
        display: none;
      }

      .page-status {
        min-width: 70px;
        padding: 0 6px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

  <header>
    <a class="logo" href="index.html">dB <span>Dergi</span></a>
    <div class="issue-name" id="issueName">ISSUE #001 · 22 Temmuz 2026</div>
  </header>

  <main>
    <div class="loading" id="loading">
      Dergi hazırlanıyor…
    </div>

    <div class="book-stage">
      <div
        class="closed-book"
        id="closedBook"
        hidden
        aria-label="Kapalı dergi kapağı"
      >
        <div class="closed-volume" id="closedVolume">
          <div class="closed-pages"></div>

          <div class="closed-cover" id="closedCover">
            <div class="closed-cover-face closed-cover-front">
              <img
                id="closedCoverImage"
                alt="Dergi kapağı"
                draggable="false"
              >
            </div>

            <div class="closed-cover-face closed-cover-back"></div>

            <div class="closed-hint">
              KÖŞEYİ TUTUP AÇ
            </div>
          </div>
        </div>
      </div>

      <div
        id="book"
        class="is-hidden"
        aria-label="dB Dergi okuyucu"
      ></div>
    </div>

    <div class="controls" aria-label="Dergi kontrolleri">
      <a class="home-button" href="index.html" aria-label="Ana sayfaya dön">
        <span class="control-icon">⌂</span>
        <span class="control-label">Ana sayfa</span>
      </a>

      <button
        class="control-button"
        id="previousButton"
        type="button"
        aria-label="Önceki sayfaya geç"
      >
        <span class="control-icon">←</span>
        <span class="control-label">Önceki</span>
      </button>

      <div class="page-status" id="pageStatus">
        — / —
      </div>

      <button
        class="control-button"
        id="nextButton"
        type="button"
        aria-label="Sonraki sayfaya geç"
      >
        <span class="control-label">Sonraki</span>
        <span class="control-icon">→</span>
      </button>

      <button
        class="control-button"
        id="fullscreenButton"
        type="button"
        aria-label="Tam ekranı aç veya kapat"
      >
        <span class="control-icon">⛶</span>
        <span class="control-label" id="fullscreenLabel">Tam ekran</span>
      </button>
    </div>
  </main>

  <footer>
    Sayfanın köşesini tutup sürükleyerek çevirebilirsin.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <script type="module">
    import * as pdfjsLib from
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.mjs";

    const parameters =
      new URLSearchParams(window.location.search);

    const requestedIssue =
      parameters.get("issue") ||
      "sayi-1-2026-07-22.pdf";

    const safeIssueName =
      /^[a-z0-9._-]+\.pdf$/i.test(requestedIssue)
        ? requestedIssue
        : "sayi-1-2026-07-22.pdf";

    const pdfAddress =
      "/assets/" + safeIssueName;

    const issueBaseName =
      safeIssueName.replace(/\.pdf$/i, "");

    const generatedPagesBase =
      "/assets/pages/" +
      encodeURIComponent(issueBaseName) +
      "/";

    const generatedManifestAddress =
      generatedPagesBase +
      "manifest.json";

    const issueMatch =
      safeIssueName.match(
        /^sayi-(\d+)(?:-(\d{4})-(\d{2})-(\d{2}))?\.pdf$/i
      );

    const issueNumber =
      issueMatch ? Number(issueMatch[1]) : 1;

    const issueLabel =
      "ISSUE #" +
      String(issueNumber).padStart(3, "0");

    let issueDate = "";

    if (
      issueMatch &&
      issueMatch[2] &&
      issueMatch[3] &&
      issueMatch[4]
    ) {
      const date =
        new Date(
          Date.UTC(
            Number(issueMatch[2]),
            Number(issueMatch[3]) - 1,
            Number(issueMatch[4])
          )
        );

      issueDate =
        new Intl.DateTimeFormat("tr-TR", {
          day: "numeric",
          month: "long",
          year: "numeric",
          timeZone: "UTC"
        }).format(date);
    }

    const fullIssueLabel =
      issueDate
        ? issueLabel + " · " + issueDate
        : issueLabel;

    document.title =
      "dB Dergi · " + issueLabel;

    document
      .getElementById("issueName")
      .textContent = fullIssueLabel;

    const bookElement =
      document.getElementById("book");

    const closedBook =
      document.getElementById("closedBook");

    const closedVolume =
      document.getElementById("closedVolume");

    const closedCover =
      document.getElementById("closedCover");

    const closedCoverImage =
      document.getElementById("closedCoverImage");

    const loading =
      document.getElementById("loading");

    const previousButton =
      document.getElementById("previousButton");

    const nextButton =
      document.getElementById("nextButton");

    const fullscreenButton =
      document.getElementById("fullscreenButton");

    const fullscreenLabel =
      document.getElementById("fullscreenLabel");

    const pageStatus =
      document.getElementById("pageStatus");

    const createdImageAddresses = [];

    let pdfDocument = null;
    let pageFlip = null;
    let closedState = true;
    let coverDragging = false;
    let coverPointerId = null;
    let coverStartX = 0;
    let coverProgress = 0;
    let coverMoved = 0;
    let coverPageAddress = "";
    let coverPageRatio = 1.414;

    function loadImageDimensions(
      address
    ) {
      return new Promise(
        (resolve, reject) => {
          const image =
            new Image();

          image.onload = () => {
            resolve({
              width: image.naturalWidth,
              height: image.naturalHeight
            });
          };

          image.onerror = () => {
            reject(
              new Error(
                "İlk sayfa görseli yüklenemedi."
              )
            );
          };

          image.src = address;
        }
      );
    }

    async function loadGeneratedPages() {
      const response =
        await fetch(
          generatedManifestAddress,
          {
            cache: "no-store"
          }
        );

      if (!response.ok) {
        throw new Error(
          "Hazır sayfa listesi bulunamadı."
        );
      }

      const manifest =
        await response.json();

      if (
        !manifest ||
        !Array.isArray(manifest.pages) ||
        manifest.pages.length === 0
      ) {
        throw new Error(
          "Hazır sayfa listesi geçersiz."
        );
      }

      const pageAddresses =
        manifest.pages.map(
          pageFileName => {
            return (
              generatedPagesBase +
              encodeURIComponent(pageFileName)
            );
          }
        );

      const dimensions =
        await loadImageDimensions(
          pageAddresses[0]
        );

      return {
        pageAddresses,
        pageRatio:
          dimensions.height /
          dimensions.width
      };
    }

    function clamp(
      value,
      minimum,
      maximum
    ) {
      return Math.min(
        maximum,
        Math.max(minimum, value)
      );
    }

    function setClosedCoverProgress(
      progress,
      animate = false
    ) {
      coverProgress =
        clamp(progress, 0, 1);

      const curve =
        Math.sin(
          coverProgress * Math.PI
        );

      const angle =
        coverProgress * -179;

      const lift =
        curve * 34;

      const squeeze =
        1 - curve * 0.075;

      const skew =
        curve * -1.35;

      closedCover.style.transition =
        animate
          ? "transform 560ms cubic-bezier(0.22, 0.72, 0.18, 1), filter 560ms ease"
          : "none";

      closedCover.style.transform =
        "translateZ(" +
        lift +
        "px) rotateY(" +
        angle +
        "deg) scaleX(" +
        squeeze +
        ") skewY(" +
        skew +
        "deg)";

      closedCover.style.filter =
        "brightness(" +
        (1 - curve * 0.18) +
        ") drop-shadow(" +
        (curve * 18) +
        "px 12px " +
        (10 + curve * 18) +
        "px rgba(0,0,0," +
        (0.14 + curve * 0.26) +
        "))";

      closedCover.style.setProperty(
        "--cover-progress",
        String(coverProgress)
      );
    }

    function sizeClosedBook() {
      if (!pageFlip) {
        return;
      }

      const bounds =
        pageFlip.getBoundsRect();

      const width =
        Math.max(
          240,
          bounds.pageWidth ||
          bounds.width / 2
        );

      const height =
        Math.max(
          340,
          bounds.height
        );

      closedVolume.style.width =
        width + "px";

      closedVolume.style.height =
        height + "px";
    }

    function updateClosedControls() {
      pageStatus.textContent =
        "KAPAK";

      previousButton.disabled = true;
      nextButton.disabled = false;
    }

    function showClosedBook() {
      if (!coverPageAddress) {
        return;
      }

      closedState = true;
      coverDragging = false;
      coverPointerId = null;

      closedBook.hidden = false;
      bookElement.classList.add(
        "is-hidden"
      );

      closedCoverImage.src =
        coverPageAddress;

      sizeClosedBook();
      setClosedCoverProgress(0);
      updateClosedControls();
    }

    function hideClosedBook() {
      closedState = false;
      closedBook.hidden = true;
      bookElement.classList.remove(
        "is-hidden"
      );
    }

    function wait(
      milliseconds
    ) {
      return new Promise(resolve => {
        window.setTimeout(
          resolve,
          milliseconds
        );
      });
    }

    async function openClosedBook(
      animated = true
    ) {
      if (
        !closedState ||
        !pageFlip
      ) {
        return;
      }

      if (animated) {
        setClosedCoverProgress(
          1,
          true
        );

        await wait(570);
      }

      const nextPage =
        Math.min(
          1,
          pageFlip.getPageCount() - 1
        );

      pageFlip.turnToPage(
        nextPage
      );

      hideClosedBook();

      updatePageStatus(
        pageFlip.getCurrentPageIndex()
      );

      setClosedCoverProgress(0);
    }

    async function resetClosedCover() {
      setClosedCoverProgress(
        0,
        true
      );

      await wait(570);

      closedCover.style.transition =
        "none";
    }

    closedCover.addEventListener(
      "pointerdown",
      event => {
        if (!closedState) {
          return;
        }

        coverDragging = true;
        coverPointerId =
          event.pointerId;

        coverStartX =
          event.clientX;

        coverMoved = 0;

        closedBook.classList.add(
          "is-dragging"
        );

        closedCover.setPointerCapture(
          event.pointerId
        );

        event.preventDefault();
      }
    );

    closedCover.addEventListener(
      "pointermove",
      event => {
        if (
          !coverDragging ||
          event.pointerId !==
            coverPointerId
        ) {
          return;
        }

        const rect =
          closedCover.getBoundingClientRect();

        const distance =
          coverStartX -
          event.clientX;

        coverMoved =
          Math.max(
            coverMoved,
            Math.abs(distance)
          );

        const progress =
          distance /
          Math.max(rect.width, 1);

        setClosedCoverProgress(
          progress * 1.15
        );

        event.preventDefault();
      }
    );

    async function finishCoverDrag(
      event
    ) {
      if (
        !coverDragging ||
        event.pointerId !==
          coverPointerId
      ) {
        return;
      }

      coverDragging = false;
      coverPointerId = null;

      closedBook.classList.remove(
        "is-dragging"
      );

      try {
        closedCover.releasePointerCapture(
          event.pointerId
        );
      } catch (captureError) {
        console.warn(captureError);
      }

      const rect =
        closedCover.getBoundingClientRect();

      const clickOnOpeningSide =
        coverMoved < 8 &&
        event.clientX >
          rect.left +
          rect.width * 0.55;

      if (
        coverProgress >= 0.24 ||
        clickOnOpeningSide
      ) {
        await openClosedBook(true);
      } else {
        await resetClosedCover();
      }
    }

    closedCover.addEventListener(
      "pointerup",
      finishCoverDrag
    );

    closedCover.addEventListener(
      "pointercancel",
      finishCoverDrag
    );

    function canvasToBlob(
      canvas,
      type,
      quality
    ) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(
          blob => {
            if (blob) {
              resolve(blob);
            } else {
              reject(
                new Error(
                  "Sayfa görseli oluşturulamadı."
                )
              );
            }
          },
          type,
          quality
        );
      });
    }

    async function createPageImage(
      pageNumber,
      targetWidth
    ) {
      const page =
        await pdfDocument.getPage(pageNumber);

      const originalViewport =
        page.getViewport({ scale: 1 });

      const scale =
        targetWidth /
        originalViewport.width;

      const viewport =
        page.getViewport({ scale });

      const canvas =
        document.createElement("canvas");

      canvas.width =
        Math.floor(viewport.width);

      canvas.height =
        Math.floor(viewport.height);

      const context =
        canvas.getContext("2d", {
          alpha: false
        });

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;

      const blob =
        await canvasToBlob(
          canvas,
          "image/png"
        );

      canvas.width = 1;
      canvas.height = 1;

      const address =
        URL.createObjectURL(blob);

      createdImageAddresses.push(address);

      return address;
    }

    function calculatePageWidth() {
      const mobile =
        window.innerWidth <= 800;

      const pixelRatio =
        Math.min(
          window.devicePixelRatio || 1,
          2
        );

      const availableHeight =
        Math.max(
          window.innerHeight - 205,
          430
        );

      const availableWidth =
        mobile
          ? window.innerWidth - 24
          : (window.innerWidth - 70) / 2;

      const visualWidth =
        Math.min(
          availableWidth * 2.15,
          availableHeight * 1.55
        );

      return Math.floor(
        Math.min(
          2400,
          Math.max(
            mobile ? 1500 : 1800,
            visualWidth * pixelRatio
          )
        )
      );
    }

    function updatePageStatus(
      pageIndex = 0
    ) {
      if (!pageFlip) {
        return;
      }

      if (closedState) {
        updateClosedControls();
        return;
      }

      const pageCount =
        pageFlip.getPageCount();

      const displayedPage =
        Math.min(
          pageIndex + 1,
          pageCount
        );

      pageStatus.textContent =
        displayedPage +
        " / " +
        pageCount;

      previousButton.disabled =
        pageIndex <= 0;

      nextButton.disabled =
        pageIndex >=
        pageCount - 1;
    }

    function createReader(
      pageAddresses,
      pageRatio
    ) {
      if (
        !window.St ||
        !window.St.PageFlip
      ) {
        throw new Error(
          "Sayfa çevirme sistemi yüklenemedi."
        );
      }

      const baseWidth = 560;
      const baseHeight =
        Math.round(
          baseWidth * pageRatio
        );

      pageFlip =
        new window.St.PageFlip(
          bookElement,
          {
            width: baseWidth,
            height: baseHeight,
            size: "stretch",
            minWidth: 260,
            maxWidth: 620,
            minHeight:
              Math.round(260 * pageRatio),
            maxHeight:
              Math.round(620 * pageRatio),
            drawShadow: true,
            maxShadowOpacity: 0.46,
            flippingTime: 950,
            usePortrait: true,
            startZIndex: 10,
            autoSize: true,
            showCover: true,
            mobileScrollSupport: false,
            swipeDistance: 18,
            clickEventForward: true,
            useMouseEvents: true,
            disableFlipByClick: false
          }
        );

      coverPageAddress =
        pageAddresses[0];

      coverPageRatio =
        pageRatio;

      pageFlip.on(
        "init",
        event => {
          updatePageStatus(
            event.data.page
          );

          window.setTimeout(
            () => {
              showClosedBook();
            },
            40
          );
        }
      );

      pageFlip.on(
        "flip",
        event => {
          if (event.data === 0) {
            window.setTimeout(
              () => {
                showClosedBook();
              },
              60
            );

            return;
          }

          updatePageStatus(
            event.data
          );
        }
      );

      pageFlip.loadFromImages(
        pageAddresses
      );
    }

    previousButton.addEventListener(
      "click",
      () => {
        if (
          pageFlip &&
          !closedState
        ) {
          pageFlip.flipPrev("bottom");
        }
      }
    );

    nextButton.addEventListener(
      "click",
      () => {
        if (!pageFlip) {
          return;
        }

        if (closedState) {
          openClosedBook(true);
          return;
        }

        pageFlip.flipNext("bottom");
      }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (!pageFlip) {
          return;
        }

        if (event.key === "ArrowRight") {
          if (closedState) {
            openClosedBook(true);
          } else {
            pageFlip.flipNext("bottom");
          }
        }

        if (
          event.key === "ArrowLeft" &&
          !closedState
        ) {
          pageFlip.flipPrev("bottom");
        }
      }
    );

    fullscreenButton.addEventListener(
      "click",
      async () => {
        try {
          if (
            !document.fullscreenElement
          ) {
            await document
              .documentElement
              .requestFullscreen();
          } else {
            await document
              .exitFullscreen();
          }
        } catch (error) {
          console.error(error);
        }
      }
    );

    document.addEventListener(
      "fullscreenchange",
      () => {
        fullscreenLabel.textContent =
          document.fullscreenElement
            ? "Tam ekrandan çık"
            : "Tam ekran";

        window.setTimeout(
          () => {
            if (pageFlip) {
              pageFlip.update();
            }
          },
          120
        );
      }
    );

    window.addEventListener(
      "resize",
      () => {
        window.clearTimeout(
          window.readerResizeTimer
        );

        window.readerResizeTimer =
          window.setTimeout(
            () => {
              if (pageFlip) {
                pageFlip.update();

                window.setTimeout(
                  sizeClosedBook,
                  60
                );
              }
            },
            180
          );
      }
    );

    window.addEventListener(
      "beforeunload",
      () => {
        createdImageAddresses.forEach(
          address => {
            URL.revokeObjectURL(address);
          }
        );
      }
    );

    async function startReader() {
      try {
        loading.textContent =
          "Dergi yükleniyor…";

        try {
          const generated =
            await loadGeneratedPages();

          createReader(
            generated.pageAddresses,
            generated.pageRatio
          );

          loading.textContent =
            "Köşeyi tutup sürükleyerek sayfayı çevirebilirsin.";

          window.setTimeout(
            () => {
              loading.textContent = "";
            },
            2600
          );

          return;
        } catch (generatedError) {
          console.warn(
            "Hazır sayfalar bulunamadı, PDF hazırlanıyor.",
            generatedError
          );
        }

        pdfDocument =
          await pdfjsLib
            .getDocument({
              url: pdfAddress
            })
            .promise;

        const firstPage =
          await pdfDocument.getPage(1);

        const firstViewport =
          firstPage.getViewport({
            scale: 1
          });

        const pageRatio =
          firstViewport.height /
          firstViewport.width;

        const targetWidth =
          calculatePageWidth();

        const pageAddresses = [];

        for (
          let pageNumber = 1;
          pageNumber <=
          pdfDocument.numPages;
          pageNumber += 1
        ) {
          loading.textContent =
            "Yüksek kaliteli sayfalar hazırlanıyor… " +
            pageNumber +
            " / " +
            pdfDocument.numPages;

          const address =
            await createPageImage(
              pageNumber,
              targetWidth
            );

          pageAddresses.push(address);
        }

        createReader(
          pageAddresses,
          pageRatio
        );

        loading.textContent =
          "Köşeyi tutup sürükleyerek sayfayı çevirebilirsin.";

        window.setTimeout(
          () => {
            loading.textContent = "";
          },
          2600
        );
      } catch (error) {
        console.error(error);

        loading.textContent =
          "Dergi yüklenemedi. Sayfayı yenileyip tekrar dene.";
      }
    }

    startReader();
  </script>

</body>
